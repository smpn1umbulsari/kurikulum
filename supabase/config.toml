# =============================================================================
# SUPABASE CLI CONFIGURATION
# Guru Spenturi v2
# =============================================================================

[project]
project_id = "guru-spenturi-v2"

# =============================================================================
# API Configuration
# =============================================================================

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# =============================================================================
# Auth Configuration
# =============================================================================

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

# =============================================================================
# Database Configuration
# =============================================================================

[db]
port = 54322
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

# =============================================================================
# Storage Configuration
# =============================================================================

[storage]
enabled = true
file_size_limit = "50MiB"

# =============================================================================
# Studio Configuration
# =============================================================================

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# =============================================================================
# Inbucket Configuration (Email testing)
# =============================================================================

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

# =============================================================================
# Edge Functions Configuration
# =============================================================================

[edge_functions]
enabled = true
serve_static = false

# =============================================================================
# Realtime Configuration
# =============================================================================

[realtime]
enabled = true
ip_version = "IPv4"

# =============================================================================
# END OF CONFIG
# =============================================================================